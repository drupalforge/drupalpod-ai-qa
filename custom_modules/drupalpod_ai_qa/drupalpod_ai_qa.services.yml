services:
  drupalpod_ai_qa.hook_handler:
    class: Drupal\drupalpod_ai_qa\AiQaHookHandler
    arguments:
      - '@drupalpod_ai_qa.provider_manager'
      - '@messenger'
      - '@current_route_match'
      - '@router.admin_context'
      - '@request_stack'
      - '@current_user'
      - '@string_translation'

  drupalpod_ai_qa.provider_manager:
    class: Drupal\drupalpod_ai_qa\AiQaProviderManager
    arguments:
      - '@config.factory'
      - '@entity_type.manager'
      - '@state'
      - '@datetime.time'
      - '@module_handler'
      - '@ai.provider'
      - '@logger.factory'

  drupalpod_ai_qa.key_expiry_subscriber:
    class: Drupal\drupalpod_ai_qa\EventSubscriber\KeyExpirySubscriber
    arguments:
      - '@drupalpod_ai_qa.provider_manager'
    tags:
      - { name: event_subscriber }
