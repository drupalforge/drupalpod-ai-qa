# Drupal GitLab CI template baseline.
include:
  - project: $_GITLAB_TEMPLATES_REPO
    ref: $_GITLAB_TEMPLATES_REF
    file:
      - '/includes/include.drupalci.main.yml'
      - '/includes/include.drupalci.variables.yml'
      - '/includes/include.drupalci.workflows.yml'

variables:
  SKIP_ESLINT: 1
  SKIP_PHPCS: 1
  SKIP_PHPSTAN: 1

bats:
  stage: test
  image: node:20
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends jq
  script:
    - npm ci
    - npm test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

template-version-smoke:
  stage: test
  image: registry.gitlab.com/drupal-infrastructure/drupalci/drupalci-environments/php-8.3-ubuntu-apache:production
  parallel:
    matrix:
      - SCENARIO_INDEX: ["0", "1", "2", "3", "4", "5"]
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends bash jq git unzip
  script:
    - jq ".[${SCENARIO_INDEX}] | [.]" tests/scenarios-template-version.json > /tmp/scenario.json
    - bash tests/run-scenarios.sh /tmp/scenario.json
  artifacts:
    when: always
    paths:
      - logs/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

scenario-matrix:
  stage: test
  image: registry.gitlab.com/drupal-infrastructure/drupalci/drupalci-environments/php-8.3-ubuntu-apache:production
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends bash jq git unzip
  script:
    - bash tests/run-scenarios.sh tests/scenarios.json
  artifacts:
    when: always
    paths:
      - logs/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
