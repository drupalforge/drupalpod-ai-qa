# Drupal GitLab CI template baseline.
include:
  - project: $_GITLAB_TEMPLATES_REPO
    ref: $_GITLAB_TEMPLATES_REF
    file:
      - '/includes/include.drupalci.main.yml'
      - '/includes/include.drupalci.variables.yml'
      - '/includes/include.drupalci.workflows.yml'

stages:
  - test

bats:
  stage: test
  image: node:20
  script:
    - npm ci
    - npm test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

template-version-smoke:
  stage: test
  image: composer:2
  parallel:
    matrix:
      - SCENARIO_INDEX: ["0", "1", "2", "3", "4", "5"]
  before_script:
    - |
      if command -v apk >/dev/null 2>&1; then
        apk add --no-cache bash jq git unzip
      else
        apt-get update
        apt-get install -y --no-install-recommends bash jq git unzip
      fi
  script:
    - jq ".[${SCENARIO_INDEX}] | [.]" tests/scenarios-template-version.json > /tmp/scenario.json
    - bash tests/run-scenarios.sh /tmp/scenario.json
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
